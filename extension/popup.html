<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Rich Presence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #2c2f33;
      color: #ffffff;
      padding: 16px;
      line-height: 1.5;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #7289da;
    }

    .section {
      background: #23272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .current-site {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .current-site strong {
      color: #7289da;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #b9bbbe;
      margin-bottom: 4px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      padding: 8px;
      background: #2c2f33;
      border: 1px solid #202225;
      border-radius: 4px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #7289da;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .button {
      width: 100%;
      padding: 10px;
      background: #7289da;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .button:hover {
      background: #5b6eae;
    }

    .button.secondary {
      background: #43b581;
    }

    .button.secondary:hover {
      background: #369968;
    }

    .button.danger {
      background: #f04747;
    }

    .button.danger:hover {
      background: #d84040;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .status {
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      text-align: center;
    }

    .status.success {
      background: #43b58133;
      color: #43b581;
    }

    .status.error {
      background: #f0474733;
      color: #f04747;
    }

    .status.info {
      background: #7289da33;
      color: #7289da;
    }

    .hidden {
      display: none;
    }

    .help-text {
      font-size: 11px;
      color: #72767d;
      margin-top: 4px;
    }

    .collapsible {
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .collapsible::after {
      content: '▼';
      font-size: 10px;
      transition: transform 0.2s;
    }

    .collapsible.collapsed::after {
      transform: rotate(-90deg);
    }

    .collapsible-content {
      margin-top: 12px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .app-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .app-item {
      background: #2c2f33;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-item-info {
      flex: 1;
    }

    .app-item-name {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .app-item-url {
      font-size: 11px;
      color: #72767d;
    }

    .app-item-actions {
      display: flex;
      gap: 4px;
    }

    .icon-button {
      background: transparent;
      border: none;
      color: #b9bbbe;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .icon-button:hover {
      background: #2c2f33;
    }

    .icon-button.danger:hover {
      color: #f04747;
    }

    /* Loading states and accessibility improvements */
    .loading-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 8px;
    }

    .loading-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #7289da;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Form validation styles */
    .form-group.field-valid input,
    .form-group.field-valid textarea {
      border-color: #43b581;
    }

    .form-group.field-invalid input,
    .form-group.field-invalid textarea {
      border-color: #f04747;
    }

    .field-error {
      color: #f04747;
      font-size: 11px;
      margin-top: 4px;
    }

    .character-counter {
      font-size: 10px;
      color: #72767d;
      text-align: right;
      margin-top: 2px;
    }

    .character-counter.warning {
      color: #faa61a;
    }

    /* Empty state styling */
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #72767d;
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .empty-state-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #b9bbbe;
    }

    .empty-state-text {
      font-size: 12px;
      line-height: 1.4;
    }

    /* App item improvements */
    .app-item-status {
      font-size: 11px;
      margin-top: 2px;
    }

    .app-item-status.enabled {
      color: #43b581;
    }

    .app-item-status.disabled {
      color: #f04747;
    }

    /* Focus styles for better accessibility */
    button:focus,
    input:focus,
    textarea:focus {
      outline: 2px solid #7289da;
      outline-offset: 2px;
    }

    /* High contrast mode support */
    @media (prefers-contrast: high) {
      .status.success {
        background: #ffffff;
        color: #000000;
      }
      
      .status.error {
        background: #ffffff;
        color: #000000;
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .loading-spinner {
        animation: none;
      }
      
      .collapsible::after {
        transition: none;
      }
      
      .collapsible-content {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main id="mainContent" aria-busy="false">
    <h1>Discord Rich Presence</h1>

    <div id="loadingIndicator" class="loading-indicator hidden" aria-live="polite">
      <div class="loading-spinner"></div>
      <span>Loading...</span>
    </div>

    <div id="statusMessage" class="status hidden" role="alert" aria-live="polite"></div>

    <div class="section">
      <div class="current-site">
        <strong>Current Page:</strong>
        <div id="currentUrl" style="font-size: 12px; color: #b9bbbe; margin-top: 4px;">Loading...</div>
        <div id="currentTitle" style="font-size: 11px; color: #72767d; margin-top: 2px; font-style: italic;"></div>
      </div>
    </div>

  <div class="section">
    <div class="collapsible" id="configCollapsible">
      <label style="margin: 0;">App Configuration</label>
    </div>
    <div class="collapsible-content" id="configContent">
      <form id="appConfigForm">
        <div class="form-group">
          <label for="appName">App Name *</label>
          <input type="text" id="appName" placeholder="e.g. YouTube" required>
        </div>



        <div class="form-group">
          <label for="details">Details (optional)</label>
          <input type="text" id="details" placeholder="e.g. Watching videos">
        </div>

        <div class="form-group">
          <label for="state">State (optional)</label>
          <input type="text" id="state" placeholder="e.g. Entertainment">
        </div>

        <div class="form-group">
          <label for="largeImageKey">Large Image Key (optional)</label>
          <input type="text" id="largeImageKey" placeholder="e.g. youtube_logo">
          <div class="help-text">Asset name from your Discord Application</div>
        </div>

        <div class="form-group">
          <label for="largeImageText">Large Image Text (optional)</label>
          <input type="text" id="largeImageText" placeholder="e.g. YouTube">
        </div>

        <div class="form-group">
          <label for="smallImageKey">Small Image Key (optional)</label>
          <input type="text" id="smallImageKey" placeholder="e.g. playing">
        </div>

        <div class="form-group">
          <label for="smallImageText">Small Image Text (optional)</label>
          <input type="text" id="smallImageText" placeholder="e.g. Active">
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="enabled" checked>
            <label for="enabled" style="margin: 0;">Enabled</label>
          </div>
        </div>

        <button type="submit" class="button secondary">Add/Update Site</button>
      </form>
    </div>
  </div>

  <div class="section">
    <div class="collapsible collapsed" id="appsCollapsible">
      <label style="margin: 0;">Configured Apps</label>
    </div>
    <div class="collapsible-content hidden" id="appsContent">
      <div id="appsList" class="app-list"></div>
    </div>
  </div>

  <div class="button-group">
    <button id="testConnectionBtn" class="button">Test Connection</button>
    <button id="clearActivityBtn" class="button danger">Clear Activity</button>
  </div>

  <script src="popup.js"></script>
  </main>
</body>
</html>
