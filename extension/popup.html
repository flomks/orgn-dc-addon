<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORGN Discord Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    /* === Header === */
    .header {
      padding: 20px;
      border-bottom: 1px solid #27272a;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .header-subtitle {
      font-size: 12px;
      color: #71717a;
    }

    /* === Content === */
    .content {
      padding: 16px;
    }

    /* === Status Messages === */
    #loadingIndicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      color: #a1a1aa;
      font-size: 13px;
    }

    .loading-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #statusMessage {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    #statusMessage.success {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    #statusMessage.error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    #statusMessage.info {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    /* === Cards/Sections === */
    .section {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* === Current Site === */
    .current-site-label {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 6px;
    }

    .current-site-url {
      font-size: 14px;
      color: #ffffff;
      font-weight: 500;
    }

    .current-site-title {
      font-size: 12px;
      color: #a1a1aa;
      margin-top: 4px;
      font-style: italic;
    }

    /* === Forms === */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 6px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      background: #000000;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }

    input::placeholder,
    textarea::placeholder {
      color: #71717a;
    }

    .help-text {
      font-size: 11px;
      color: #71717a;
      margin-top: 4px;
    }

    /* === Checkbox === */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
    }

    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-size: 14px;
    }

    /* === Buttons === */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #3b82f6;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #18181b;
      color: #ffffff;
      border: 1px solid #27272a;
    }

    .btn-secondary:hover {
      background: #27272a;
    }

    .btn-success {
      background: #22c55e;
      color: #ffffff;
    }

    .btn-success:hover {
      background: #16a34a;
    }

    .btn-danger {
      background: #ef4444;
      color: #ffffff;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    /* === Collapsible === */
    .collapsible {
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
    }

    .collapsible-label {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .collapsible-icon {
      font-size: 10px;
      color: #71717a;
      transition: transform 0.2s;
    }

    .collapsible.collapsed .collapsible-icon {
      transform: rotate(-90deg);
    }

    .collapsible-content {
      margin-top: 12px;
      overflow: hidden;
    }

    /* === App List === */
    .app-list {
      max-height: 280px;
      overflow-y: auto;
    }

    .app-item {
      background: #000000;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }

    .app-item:hover {
      border-color: #3f3f46;
    }

    .app-item-info {
      flex: 1;
      min-width: 0;
    }

    .app-item-name {
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 2px;
    }

    .app-item-url {
      font-size: 11px;
      color: #71717a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .app-item-status {
      font-size: 11px;
      margin-top: 4px;
    }

    .app-item-status.enabled {
      color: #22c55e;
    }

    .app-item-status.disabled {
      color: #71717a;
    }

    .app-item-actions {
      display: flex;
      gap: 4px;
      margin-left: 12px;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid #27272a;
      color: #a1a1aa;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: #18181b;
      color: #ffffff;
      border-color: #3f3f46;
    }

    .icon-btn.danger:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-color: #ef4444;
    }

    /* === Empty State === */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
    }

    .empty-state-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state-title {
      font-size: 14px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 6px;
    }

    .empty-state-text {
      font-size: 12px;
      color: #71717a;
      line-height: 1.5;
    }

    /* === Scrollbar === */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }

    /* === Utility === */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ORGN Discord Bridge</h1>
    <div class="header-subtitle">Discord Rich Presence for Web Apps</div>
  </div>

  <div class="content">
    <div id="loadingIndicator" class="hidden">
      <div class="loading-spinner"></div>
      <span>Loading...</span>
    </div>

    <div id="statusMessage" class="hidden" role="alert"></div>

    <!-- Current Page -->
    <div class="section">
      <div class="current-site-label">CURRENT PAGE</div>
      <div class="current-site-url" id="currentUrl">Detecting...</div>
      <div class="current-site-title" id="currentTitle"></div>
    </div>

    <!-- Configuration Form -->
    <div class="section">
      <div class="collapsible" id="configCollapsible">
        <span class="collapsible-label">Configuration</span>
        <span class="collapsible-icon">▼</span>
      </div>
      <div class="collapsible-content" id="configContent">
        <form id="appConfigForm">
          <div class="form-group">
            <label for="appName">App Name *</label>
            <input type="text" id="appName" placeholder="YouTube" required>
          </div>

          <div class="form-group">
            <label for="details">Details</label>
            <input type="text" id="details" placeholder="Watching videos">
          </div>

          <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" placeholder="Entertainment">
          </div>

          <div class="form-group">
            <label for="largeImageKey">Large Image Key</label>
            <input type="text" id="largeImageKey" placeholder="youtube_logo">
            <div class="help-text">Asset name from Discord Application</div>
          </div>

          <div class="form-group">
            <label for="largeImageText">Large Image Text</label>
            <input type="text" id="largeImageText" placeholder="YouTube">
          </div>

          <div class="form-group">
            <label for="smallImageKey">Small Image Key</label>
            <input type="text" id="smallImageKey" placeholder="playing">
          </div>

          <div class="form-group">
            <label for="smallImageText">Small Image Text</label>
            <input type="text" id="smallImageText" placeholder="Active">
          </div>

          <div class="form-group">
            <div class="checkbox-group">
              <input type="checkbox" id="enabled" checked>
              <label for="enabled">Enabled</label>
            </div>
          </div>

          <button type="submit" class="btn btn-success">Save Configuration</button>
        </form>
      </div>
    </div>

    <!-- Configured Apps -->
    <div class="section">
      <div class="collapsible collapsed" id="appsCollapsible">
        <span class="collapsible-label">Configured Apps</span>
        <span class="collapsible-icon">▼</span>
      </div>
      <div class="collapsible-content hidden" id="appsContent">
        <div id="appsList" class="app-list"></div>
      </div>
    </div>

    <!-- Actions -->
    <div class="button-group">
      <button id="testConnectionBtn" class="btn btn-secondary">Test Connection</button>
      <button id="clearActivityBtn" class="btn btn-danger">Clear Activity</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
